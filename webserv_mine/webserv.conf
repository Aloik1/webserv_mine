server {
    listen 8080;
    server_name localhost;

    client_max_body_size 100M; 

    root ./www;
    index index.html;
    autoindex on;

    error_page 404 /errors/404.html;

    location /upload {
        root ./www/upload;
        allow_methods GET POST;
        upload_store ./uploads;
    }

    location /cgi {
        root ./www;
        cgi_extension .py;
        cgi_path /usr/bin/python3;
        allow_methods GET POST;
    }
}