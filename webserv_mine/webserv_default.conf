server {
    listen 80;
    server_name localhost;

    root ./www;
    index index.html;

    location / {
        allow_methods GET POST;
        autoindex on;
    }

    location /cgi-bin/ {
        allow_methods GET POST;
        cgi_extension py;
        cgi_path /usr/bin/python3;
    }

    location /uploads/ {
        allow_methods GET POST DELETE;
        upload_store ./www/uploads;
    }

    error_page 404 /404.html;
}
